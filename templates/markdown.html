<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>{{ name }}</title>
    <link rel="icon" type="image/x-icon" href="/srv/static/ico/markdown.ico">
    <link rel="stylesheet" href="/srv/static/css/markdown.css">
    <script src="/srv/static/js/marked.js"></script>
  <head>
  <body>
    <div id="container"></div>
  </body>
  <script>
    function renderMarkdown(data) {
        const container = document.getElementById("container");
        container.innerHTML = marked.parse(data);
        container.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(h => {
            if (!h.id) h.id = h.textContent.toLowerCase().trim().replace(/[^\w]+/g, '-');
        });
    }
    fetch("?get=file").then(res => res.text())
      .then((data) => renderMarkdown(data))
      .catch(() => alert("Unable to load file"));
  </script>
</html>
